<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scanner QR - Présences</title>

  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f5f5;
      color: #222;
      text-align: center;
    }
    header {
      background: #1976d2;
      color: #fff;
      padding: 12px 16px;
    }
    h1 {
      font-size: 1.3rem;
      margin: 0;
    }
    main {
      padding: 16px;
    }
    #reader {
      width: 320px;
      max-width: 100%;
      margin: 16px auto;
    }
    #status {
      margin-top: 10px;
      font-size: 0.95rem;
      color: #555;
    }
    .btn {
      display: inline-block;
      padding: 8px 16px;
      margin-top: 8px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      background: #1976d2;
      color: #fff;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Scanner QR - Présences</h1>
  </header>

  <main>
    <p>Autorisez l'accès à la caméra puis présentez votre code QR devant l'écran.</p>

    <div id="reader"></div>
    <div id="status">Initialisation du scanner...</div>
    <button id="restart" class="btn" style="display:none;">Relancer le scan</button>
  </main>

  <script>
    // URL de ta Web App Apps Script (déploiement)
    const webAppUrl = "https://script.google.com/macros/s/AKfycbzotp0x1Uu34_tn0AtSKyvSOe79b9hkV6RVguWUpXncsaaMljbQms1U29PSJrBXDFX8lg/exec";

    // On lit les paramètres arrivés (activite, session)
    const params = new URLSearchParams(window.location.search);
    const activiteParam = params.get("activite");
    const sessionParam = params.get("session");

    const statusEl = document.getElementById("status");
    const restartBtn = document.getElementById("restart");

    function onScanSuccess(decodedText, decodedResult) {
      statusEl.textContent = "Code détecté, redirection en cours...";

      let url = webAppUrl + "?qr=" + encodeURIComponent(decodedText);

      if (activiteParam) {
        url += "&activite=" + encodeURIComponent(activiteParam);
      }
      if (sessionParam) {
        url += "&session=" + encodeURIComponent(sessionParam);
      }

      window.location.href = url;
    }

    function onScanFailure(error) {
      // Erreurs de scan fréquentes, on ignore
    }

    function startScanner() {
      statusEl.textContent = "Scanner en cours, pointez le QR vers la caméra...";
      restartBtn.style.display = "none";

      const html5QrcodeScanner = new Html5QrcodeScanner(
        "reader",
        { fps: 10, qrbox: 250 }
      );
      html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    }

    restartBtn.addEventListener("click", startScanner);

    startScanner();
  </script>
</body>
</html>
